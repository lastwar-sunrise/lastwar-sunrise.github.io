<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Last War 1784 助手</title>
<style>
    body { font-family: -apple-system, sans-serif; padding: 15px; background: #f0f2f5; }
    .box { margin-bottom: 20px; padding: 15px; background: #fff; border-radius: 12px; border: 1px solid #ddd; }
    h3 { font-size: 1.1em; color: #1a73e8; margin: 0 0 10px 0; }
    .red { color: red; font-weight: bold; }
    .green { color: green; font-weight: bold; }
    .today { background: #fff9c4; border: 1px solid #fbc02d; padding: 5px; border-radius: 4px; display: block; }
    hr { border: 0; border-top: 1px solid #eee; margin: 8px 0; }
</style>
</head>
<body>

<div class="box">
    <h3>🔴 紅星戰區資訊</h3>
    <div id="zone">計算中...</div>
</div>

<div class="box">
    <h3>📅 1784 七日策略</h3>
    <div id="strategy">計算中...</div>
</div>

<script>
// 使用 var 確保舊版 Safari 相容
var weekNames = ["日","一","二","三","四","五","六"];
var now = new Date();

function updateApp() {
// 1. 戰區輪替邏輯
var baseRot = new Date(2026, 2, 21, 10, 0, 0).getTime();

var zones = [
    ["1769","1772","1775","1776","1783","1789","1790","1793","1796"], 
    ["1765","1770","1771","1777","1778","1779","1784","1785","1791"], 
    ["1766","1767","1768","1773","1774","1780","1781","1782","1786","1787","1788","1792","1794","1795"] 
];

var sTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 10, 0, 0);
if(now.getHours() < 10) sTime.setDate(sTime.getDate() - 1);

var diffDays = Math.floor((sTime.getTime() - baseRot) / 86400000);

// 對齊 3/26 為第一組
var zIdx = (diffDays + 1) % 3;
if(zIdx < 0) zIdx += 3;

var eTime = new Date(sTime.getTime() + 86400000);

document.getElementById("zone").innerHTML = 
    (sTime.getMonth()+1) + "/" + sTime.getDate() + " 10:00 ~ " + 
    (eTime.getMonth()+1) + "/" + eTime.getDate() + " 10:00<br>戰區：<strong>" + 
    zones[zIdx].join(", ") + "</strong>";

    // 2. 七日策略邏輯
    var baseRedMs = new Date(2026, 2, 24, 10, 0, 0).getTime();
    var cycleMs = 259200000; // 72小時
    var html = "";

    for(var i=0; i<7; i++) {
        var d = new Date(now.getFullYear(), now.getMonth(), now.getDate() + i);
        var dMs = d.getTime();
        var dEndMs = dMs + 86399999;
        
        // 檢查紅星
        var hasRed = false;
        var checkT = baseRedMs;
        while(checkT <= dEndMs) {
            if(checkT >= dMs && checkT <= dEndMs) { hasRed = true; break; }
            checkT += cycleMs;
        }

        // 檢查保留
        var needSave = false;
        for(var j=0; j<=3; j++) {
            var fD = new Date(d.getFullYear(), d.getMonth(), d.getDate() + j);
            if(fD.getDay() === 2 || fD.getDay() === 6) { needSave = true; break; }
        }

        var label = (d.getMonth()+1) + "/" + d.getDate() + " (週" + weekNames[d.getDay()] + ")";
        if(hasRed) label += " <small>10點後</small>";

        var desc = hasRed ? "<span class='red'>有紅星</span>" : "無";
        if(hasRed && needSave) desc += " / <span class='red'>留</span>";
        if(d.getDay() === 2 || d.getDay() === 6) {
            desc += hasRed ? " / <span class='green'>出(當日)</span>" : " / <span class='green'>出(舊)</span>";
        }

        var row = label + "：" + desc;
        if(i === 0) row = "<span class='today'>" + row + "</span>";
        html += row + (i < 6 ? "<hr>" : "");
    }
    document.getElementById("strategy").innerHTML = html;
}

// 直接執行，不包在任何事件裡
try {
    updateApp();
} catch(e) {
    document.getElementById("strategy").innerHTML = "錯誤: " + e.message;
}
</script>

</body>
</html>
