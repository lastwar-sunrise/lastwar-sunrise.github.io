<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>The Sunrisers</title>
        <link rel="manifest" href="manifest.json">
        <link rel="apple-touch-icon" href="apple-touch-icon.png">
        <style>
            /* --- 啟動畫面遮罩樣式 --- */
            #custom-splash {
                position: fixed;
                top: 0; left: 0; width: 100%; height: 100%;
                background-color: #f0f2f5;
                display: flex; flex-direction: column; justify-content: center; align-items: center;
                z-index: 9999;
                transition: opacity 0.5s ease-out;
            }
            .splash-icon { width: 120px; height: 120px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
            .splash-loader { width: 30px; height: 30px; border: 3px solid #ccc; border-top: 3px solid #1a73e8; border-radius: 50%; animation: spin 1s linear infinite; }
            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                padding: 8px; background: #f0f2f5; line-height: 1.5; color: #333; overflow: hidden; 
            }
            .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 0 4px; }
            .btn-group { display: flex; gap: 5px; }
            .action-btn { background: #1a73e8; color: white; border: none; padding: 5px 10px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 12px; }
            #install-btn { background: #34a853; display: none; }
            
            .box { margin-bottom: 12px; padding: 12px; background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
            h3 { font-size: 1.1em; margin-top: 0; margin-bottom: 8px; color: #1a73e8; border-left: 4px solid #1a73e8; padding-left: 8px; }
            #zone, #strategy { font-size: 0.95em; word-break: break-all; }
            .red { color: #d93025; font-weight: bold; }
            .green { color: #188038; font-weight: bold; }
            .gold { color: #d4af37; font-weight: bold; }
            .purple { color: #a333c8; font-weight: bold; }
            .event-text { color: #e67e22; font-weight: bold; }
            .drill-text { color: #9b59b6; font-weight: bold; }
            .note-text { color: #666; font-weight: bold; }
            .today-row { background-color: #fff9c4; display: block; padding: 4px 6px; border-radius: 5px; border: 1px solid #fbc02d; margin: 4px 0; }
            .shield-alert { background-color: #d93025; color: white; padding: 1px 6px; border-radius: 3px; font-weight: bold; display: inline-block; margin-top: 2px; font-size: 0.9em; animation: blink 1s infinite; }
            @keyframes blink { 50% { opacity: 0.7; } }
            hr { border: 0; border-top: 1px solid #eee; margin: 8px 0; }
        </style>
    </head>
    <body>

        <div id="custom-splash">
            <img src="apple-touch-icon.png" class="splash-icon" alt="App Icon">
            <div class="splash-loader"></div>
            <p style="margin-top: 15px; color: #666; font-weight: bold;">Loading Strategy...</p>
        </div>

        <div class="header-row">
            <h2 style="margin:0; font-size: 1.0em;">This Page for Sunrisers only.</h2>
            <div class="btn-group">
                <button id="install-btn" class="action-btn">📲 Install</button>
                <button id="lang-btn" class="action-btn" onclick="toggleLang()">ZH / EN / VI</button>
            </div>
        </div>

        <div class="box">
            <h3 id="title-zone">🔴 紅星戰區資訊 (當前)</h3>
            <div id="zone">Loading...</div>
        </div>

        <div class="box">
            <h3 id="title-strategy">📅 近七日策略</h3>
            <div id="strategy">Loading...</div>
        </div>
        
        <div id="footer-date" style="text-align: center; font-size: 11px; color: #aaa; margin-bottom: 15px;">
            最後部署日期：2026/04/07 10:15
        </div>

        <script>
            let currentLang = localStorage.getItem('lang') || 'zh';
            let deferredPrompt;

								 
            window.addEventListener('load', () => {
                const splash = document.getElementById('custom-splash');
                setTimeout(() => {
                    splash.style.opacity = '0';
                    document.body.style.overflow = 'auto'; 
                    setTimeout(() => { splash.style.display = 'none'; }, 500);
                }, 1500); 
            });

            const i18n = {
                zh: {
                    install: "📲 安裝到桌面",
                    iosMsg: "iOS 使用者請點擊瀏覽器下方的『分享』按鈕，然後選擇『加入主螢幕』。",
                    titleZone: "🔴 紅星戰區資訊 (當前)",
                    titleStrategy: "📅 近七日策略",
                    footer: "最後部署日期：2026/04/07 10:15",
                    timePeriod: "時段",
                    zone: "戰區",
                    weeks: ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"],
                    redStar: "🔴 紅星",
                    hasTask: "有任務",
                    noTask: "無任務",
                    suggestSendToday: "建議派出(當日的)",
                    suggestSendSaved: "建議派出(先前保留的)",
                    suggestSave: "建議保留",
                    truck: "🚚 貨車",
                    truckUR: "限 <span class='gold'> UR </span>",
                    truckSSR: "優先 <span class='purple'> SSR </span> 再 <span class='gold'> UR </span>",
                    event: "✨ 事件",
                    events: {
                        zombie: "🧟 殭屍入侵",
                        boss: "👹 狂暴首領(國會周圍)",
                        vanguard: "👨‍🏫 先鋒教官",
                        doomsday: "🌋 末日降臨(打3隻阿胖)",
                        none: "無特殊大型活動"
                    },
                    drill: "⚔️ 聯盟軍演",
                    shieldOn: "護盾 ON (GMT+8 10:00)",
                    shieldOff: "護盾 OFF (GMT+8 10:00)",
                    note: "📝 備註",
                    noteExpedition: "需要打完遠征",
                    noteShop: "購買商店物品",
                    noteRadar: "存雷達",
                    noteMining: "晚上挖礦到隔天10點(不能離開礦點)",
                    displayTZ: "(GMT+8)"
                },
                en: {
                    install: "📲 Install",
                    iosMsg: "iOS: Tap 'Share' and 'Add to Home Screen'.",
                    titleZone: "🔴 Red Star Zone Info",
                    titleStrategy: "📅 7-Day Strategy",
                    footer: "Last Update: 2026/04/07 10:15",
                    timePeriod: "Period",
                    zone: "Zones",
                    weeks: ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],
                    redStar: "🔴 Red Star",
                    hasTask: "Available",
                    noTask: "None",
                    suggestSendToday: "Dispatch (Today)",
                    suggestSendSaved: "Dispatch (Saved)",
                    suggestSave: "SAVE",
                    truck: "🚚 Truck",
                    truckUR: "<span class='gold'> UR </span> only",
                    truckSSR: "<span class='purple'> SSR </span> first, then <span class='gold'> UR </span>",
                    event: "✨ Event",
                    events: {
                        zombie: "🧟 Zombie Invasion",
                        boss: "👹 Rampage Boss (around the capitol)",
                        vanguard: "👨‍🏫 Vanguard",
                        doomsday: "🌋 Doomsday (defeat 3 fatty)",
                        none: "No major event"
                    },
                    drill: "⚔️ Drill",
                    shieldOn: "Shield ON (10:00 AM)",
                    shieldOff: "Shield OFF (10:00 AM)",
                    note: "📝 Note",
                    noteExpedition: "Complete Campaign",
                    noteShop: "Purchase Shop Items",
                    noteRadar: "Save Radar tasks",
                    noteMining: "Mine at night until 10 AM (Stay at node)",
                    displayTZ: "(GMT+8)"
                },
                vi: {
                    install: "📲 Cài đặt",
                    iosMsg: "iOS: Nhấn 'Chia sẻ' và 'Thêm vào màn hình chính'.",
                    titleZone: "🔴 Thông tin Chiến khu",
                    titleStrategy: "📅 Chiến thuật 7 ngày",
                    footer: "Cập nhật mới nhất: 2026/04/07 10:15",
                    timePeriod: "Thời gian",
                    zone: "Chiến khu",
                    weeks: ["Chủ Nhật","Thứ 2","Thứ 3","Thứ 4","Thứ 5","Thứ 6","Thứ 7"],
                    redStar: "🔴 Sao Đỏ",
                    hasTask: "Có nhiệm vụ",
                    noTask: "Không có",
                    suggestSendToday: "Gửi đi (Hôm nay)",
                    suggestSendSaved: "Gửi đi (Đã lưu)",
                    suggestSave: "LƯU LẠI",
                    truck: "🚚 Xe tải",
                    truckUR: "Chỉ <span class='gold'> UR </span>",
                    truckSSR: "Ưu tiên <span class='purple'> SSR </span> rồi đến <span class='gold'> UR </span>",
                    event: "✨ Sự kiện",
                    events: {
                        zombie: "🧟 Thây ma xâm chiếm",
                        boss: "👹 Boss cuồng bạo (Quanh quốc hội)",
                        vanguard: "👨‍🏫 Huấn luyện viên tiên phong",
                        doomsday: "🌋 Ngày tận thế (Đánh 3 béo)",
                        none: "Không có sự kiện lớn"
                    },
                    drill: "⚔️ Diễn tập liên minh",
                    shieldOn: "Bật Khiên (09:00 AM ICT)",
                    shieldOff: "Tắt Khiên (09:00 AM ICT)",
                    note: "📝 Ghi chú",
                    noteExpedition: "Hoàn thành Viễn chinh",
                    noteShop: "Mua đồ trong Shop",
                    noteRadar: "Lưu nhiệm vụ Radar",
                    noteMining: "Đào mỏ qua đêm đến 9h sáng (Không rời mỏ)",
                    displayTZ: "(GMT+7)"
                }
            };

            if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault(); deferredPrompt = e;
                document.getElementById('install-btn').style.display = 'block';
            });

            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            if (isIOS) { document.getElementById('install-btn').style.display = 'block'; }

            document.getElementById('install-btn').addEventListener('click', () => {
                const t = i18n[currentLang];
                if (isIOS) { alert(t.iosMsg); } 
                else if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then(() => {
                        document.getElementById('install-btn').style.display = 'none';
                        deferredPrompt = null;
                    });
                }
            });

            function toggleLang() {
                if (currentLang === 'zh') currentLang = 'en';
                else if (currentLang === 'en') currentLang = 'vi';
                else currentLang = 'zh';
                
                localStorage.setItem('lang', currentLang);
                render();
            }

            function render() {
                const t = i18n[currentLang];
                document.getElementById('title-zone').innerText = t.titleZone;
                document.getElementById('title-strategy').innerText = t.titleStrategy;
                document.getElementById('footer-date').innerText = t.footer;
                document.getElementById('install-btn').innerText = t.install;

                // --- 核心改動：強制校準為伺服器時間 (GMT+8) ---
                const now = new Date();
                const serverTime = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (8 * 3600000));
                
                let logicToday = new Date(serverTime);
                if (serverTime.getHours() < 10) {
                    logicToday.setDate(logicToday.getDate() - 1);
                }
                const logicZero = new Date(logicToday.getFullYear(), logicToday.getMonth(), logicToday.getDate());

                // 戰區計算
                const baseRotation = new Date(2026, 2, 20); 
                const zones = [
                    ["1769","1772","1775","1776","1783","1789","1790","1793","1796"], 
                    ["1765","1770","1771","1777","1778","1779","1784","1785","1791","1797"], 
                    ["1766","1767","1768","1773","1774","1780","1781","1782","1786","1787","1788","1792","1794","1795"] 
                ];
                
                let diffDays = Math.floor((logicZero.getTime() - baseRotation.getTime()) / 86400000);
                let zoneIndex = diffDays % 3; if (zoneIndex < 0) zoneIndex += 3;

                // 顯示時段轉換
                let hStart = currentLang === 'vi' ? 9 : 10;
                let displayStart = new Date(logicZero);
												
                let displayEnd = new Date(displayStart.getTime() + 86400000);

                document.getElementById("zone").innerHTML = 
                    `<strong>${t.timePeriod}：</strong>${displayStart.getMonth() + 1}/${displayStart.getDate()} ${hStart}:00 AM ~ ${displayEnd.getMonth() + 1}/${displayEnd.getDate()} ${hStart}:00 AM ${t.displayTZ}<br>` +
                    `<strong>${t.zone}：</strong>${zones[zoneIndex].join(", ")}`;

                let strategyHtml = "";

                for(let i = 0; i < 7; i++) {
                    let loopDate = new Date(logicZero.getTime() + i * 86400000);
                    let dayOfWeek = loopDate.getDay();
                    
                    let hasRed = (Math.floor((loopDate.getTime() - new Date(2026, 2, 24).getTime()) / 86400000) % 3 === 0);
                    let isSpecialDay = (dayOfWeek === 2 || dayOfWeek === 6);
                    
                    let isWeekOne = (Math.floor((loopDate.getTime() - new Date(2026, 3, 6).getTime()) / (7 * 86400000)) % 2 === 0);
                    let hasDrill = (Math.floor((loopDate.getTime() - new Date(2026, 3, 6).getTime()) / 86400000) % 2 !== 0);

                    let label = `<strong>${loopDate.getMonth()+1}/${loopDate.getDate()} (${t.weeks[dayOfWeek]})</strong>`;

                    let redContent = hasRed ? `<span class='red'>${t.hasTask}</span> / ` : `${t.noTask}`;
                    if(hasRed) {
                        if (isSpecialDay) redContent += `<span class='green'>${t.suggestSendToday}</span>`;
                        else {
                            let willSave = false;
                            for(let j=1; j<=2; j++) {
                                if(new Date(loopDate.getTime()+j*86400000).getDay() % 4 === 2) willSave = true;
                            }
                            redContent += willSave ? `<span class='red'>${t.suggestSave}</span>` : `<span class='green'>${t.suggestSendToday}</span>`;
                        }
                    } else if (isSpecialDay) {
                        redContent += ` / <span class='green'>${t.suggestSendSaved}</span>`;
                    }

                    let mainEvent = ""; 
                    if (isWeekOne) {
                        if (dayOfWeek >= 3 && dayOfWeek <= 5) mainEvent = t.events.zombie;
                        else if (dayOfWeek === 0) mainEvent = t.events.boss;
                    } else {
                        if (dayOfWeek >= 3 && dayOfWeek <= 5) mainEvent = t.events.vanguard;
                        else if (dayOfWeek === 0) mainEvent = t.events.doomsday;
                    }

                    let eventDisplay = "";
                    if (mainEvent !== "") {
                        eventDisplay = `<span class="event-text">${mainEvent}</span>`;
                        if (hasDrill) eventDisplay += ` / <span class="drill-text">${t.drill}</span>`;
                    } else if (hasDrill) {
                        eventDisplay = `<span class="drill-text">${t.drill}</span>`;
                    } else {
                        eventDisplay = `<span class="event-text">${t.events.none}</span>`;
                    }

										 
                    let notes = [];
                    if (dayOfWeek === 1 || dayOfWeek === 3 || dayOfWeek === 5) notes.push(t.noteExpedition);
                    if (dayOfWeek === 0) notes.push(t.noteShop);
					
															   
                    if (dayOfWeek === 0 || dayOfWeek === 2 || dayOfWeek === 4) notes.push(t.noteRadar);
					
													  
                    if (dayOfWeek === 0) notes.push(t.noteMining);

                    let noteRow = notes.length > 0 ? `<br>└ ${t.note}：<span class="note-text">${notes.join(" / ")}</span>` : "";

                    let row = `${label}<br>└ ${t.redStar}：${redContent}<br>└ ${t.truck}：${isSpecialDay?t.truckUR:t.truckSSR}<br>└ ${t.event}：${eventDisplay}${noteRow}`;
                    
                    if (dayOfWeek === 6) row += `<br>└ 🛡️ <span class="shield-alert">${t.shieldOn}</span>`;
                    else if (dayOfWeek === 0) row += `<br>└ 🛡️ <span class="shield-alert">${t.shieldOff}</span>`;

                    if(i === 0) row = `<span class="today-row">${row}</span>`;
                    strategyHtml += row + (i < 6 ? "<hr>" : "");
                }
                document.getElementById("strategy").innerHTML = strategyHtml;
            }
            window.onload = render;
        </script>
    </body>
</html>
